{% extends 'base.html' %}

{% block title %}Editar Leitura #{{ leitura['id'] }}{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h1 class="page-title">Editar Leitura</h1>
    <p class="page-sub">ID #{{ leitura['id'] }} — {{ leitura['timestamp'] }}</p>
  </div>
  <a href="{{ url_for('listar') }}" class="btn btn-ghost">← Voltar</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('editar_submit', id=leitura['id']) }}">
    <div class="form-group">
      <label for="temperatura">Temperatura (°C)</label>
      <input
        type="number" step="0.1" id="temperatura" name="temperatura"
        value="{{ leitura['temperatura'] }}" required
        class="form-input"
      >
    </div>

    <div class="form-group">
      <label for="umidade">Umidade (%)</label>
      <input
        type="number" step="0.1" id="umidade" name="umidade"
        value="{{ leitura['umidade'] }}" required
        class="form-input"
      >
    </div>

    <div class="form-group">
      <label for="pressao">Pressão (hPa) <span class="optional">— opcional</span></label>
      <input
        type="number" step="0.1" id="pressao" name="pressao"
        value="{{ leitura['pressao'] if leitura['pressao'] else '' }}"
        class="form-input"
      >
    </div>

    <div class="form-group">
      <label for="localizacao">Localização</label>
      <input
        type="text" id="localizacao" name="localizacao"
        value="{{ leitura['localizacao'] }}"
        class="form-input"
      >
    </div>

    <div class="form-actions">
      <a href="{{ url_for('listar') }}" class="btn btn-ghost">Cancelar</a>
      <button type="submit" class="btn btn-primary">Salvar alterações</button>
    </div>
  </form>
</div>
{% endblock %}
